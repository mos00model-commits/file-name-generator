<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Rename Tool</title>
  <style>
    :root {
      --bg: #05070d;
      --panel: #0b1220;
      --panel-2: #111a2b;
      --line: #22304a;
      --text: #f8fafc;
      --muted: #9fb0c8;
      --accent: #3b82f6;
      --card-red: #ff3b3b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1380px;
      margin: 0 auto;
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 220px 220px 220px 1fr;
      gap: 14px;
      margin-bottom: 20px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 600;
    }

    input, select, button {
      width: 100%;
      border: 1px solid #3a67a0;
      background: #07163b;
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    .action-row {
      display: flex;
      gap: 10px;
    }

    .action-row button {
      width: auto;
      min-width: 170px;
      background: #3b82f6;
      border-color: #3b82f6;
    }

    .action-row .ghost {
      background: #334155;
      border-color: #334155;
    }

    .group-title {
      font-size: 20px;
      font-weight: 800;
      margin: 24px 0 12px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }

    .card {
      background: #081633;
      border: 2px solid var(--card-red);
      border-radius: 20px;
      padding: 18px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform .15s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card-top {
      font-size: 21px;
      font-weight: 800;
      line-height: 1.35;
      white-space: pre-line;
      word-break: break-word;
    }

    .card-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 14px;
    }

    .copied {
      box-shadow: 0 0 0 2px rgba(255,59,59,.25), 0 0 18px rgba(255,59,59,.25);
    }

    @media (max-width: 1080px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .topbar {
        grid-template-columns: 1fr;
      }
      .action-row {
        flex-direction: column;
      }
      .action-row button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Batch Rename Tool</h1>
    <div class="sub">เปลี่ยนชื่อและวันที่ครั้งเดียวได้ทุกกลุ่ม และเปลี่ยนประเภทแยกแต่ละกลุ่มได้</div>

    <div class="topbar">
      <div class="field">
        <label>ชื่อ</label>
        <input id="baseName" value="John" />
      </div>

      <div class="field">
        <label>วันที่</label>
        <input id="dateText" value="031126" />
      </div>

      <div class="field">
        <label>ประเภทของ T_</label>
        <select id="tCategory">
          <option>Cloths</option>
          <option>Pant</option>
          <option>Shirt</option>
          <option>Sock</option>
          <option>Shoe</option>
        </select>
      </div>

      <div class="action-row">
        <button id="copySelectedBtn">คัดลอกใบที่เลือก</button>
        <button id="copyAllBtn" class="ghost">คัดลอกทั้งหมด</button>
      </div>
    </div>

    <div class="group-title">กลุ่ม M</div>
    <div class="cards" id="mGroup"></div>

    <div class="group-title">กลุ่ม CH</div>
    <div class="cards" id="chGroup"></div>

    <div class="group-title">กลุ่ม T</div>
    <div class="cards" id="tGroup"></div>
  </div>

  <script>
    const categories = ['Cloths', 'Pant', 'Shirt', 'Sock', 'Shoe'];
    const mGroup = document.getElementById('mGroup');
    const chGroup = document.getElementById('chGroup');
    const tGroup = document.getElementById('tGroup');

    const baseNameEl = document.getElementById('baseName');
    const dateTextEl = document.getElementById('dateText');
    const tCategoryEl = document.getElementById('tCategory');
    const copySelectedBtn = document.getElementById('copySelectedBtn');
    const copyAllBtn = document.getElementById('copyAllBtn');

    let selectedNames = new Set();
    let currentData = { M: [], CH: [], T: [] };

    function buildData() {
      const name = baseNameEl.value.trim() || 'John';
      const date = dateTextEl.value.trim() || '031126';
      const tCategory = tCategoryEl.value;

      currentData.M = categories.map(cat => `M_${name}\n${date}_${cat}`);
      currentData.CH = categories.map(cat => `CH_${name}\n${date}_${cat}`);
      currentData.T = [
        `T_${name}\n${date}_${tCategory}_BC`,
        `T_${name}\n${date}_${tCategory}_R`,
        `T_${name}\n${date}_${tCategory}_M`
      ];
    }

    function createCard(text) {
      const card = document.createElement('div');
      card.className = 'card';
      if (selectedNames.has(text)) card.classList.add('copied');

      const top = document.createElement('div');
      top.className = 'card-top';
      top.textContent = text;

      const sub = document.createElement('div');
      sub.className = 'card-sub';
      sub.textContent = 'คลิกเพื่อเลือกและคัดลอก';

      card.appendChild(top);
      card.appendChild(sub);

      card.addEventListener('click', async () => {
        if (selectedNames.has(text)) {
          selectedNames.delete(text);
          card.classList.remove('copied');
        } else {
          selectedNames.add(text);
          card.classList.add('copied');
        }
      });

      return card;
    }

    function render() {
      buildData();
      mGroup.innerHTML = '';
      chGroup.innerHTML = '';
      tGroup.innerHTML = '';

      currentData.M.forEach(item => mGroup.appendChild(createCard(item)));
      currentData.CH.forEach(item => chGroup.appendChild(createCard(item)));
      currentData.T.forEach(item => tGroup.appendChild(createCard(item)));
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert('คัดลอกเรียบร้อย');
      } catch (err) {
        alert('คัดลอกไม่สำเร็จ');
      }
    }

    copySelectedBtn.addEventListener('click', () => {
      const text = [...selectedNames].join('\n\n');
      if (!text) {
        alert('ยังไม่ได้เลือกการ์ด');
        return;
      }
      copyText(text.replace(/\n/g, ''));
    });

    copyAllBtn.addEventListener('click', () => {
      buildData();
      const all = [...currentData.M, ...currentData.CH, ...currentData.T]
        .map(x => x.replace(/\n/g, ''))
        .join('\n');
      copyText(all);
    });

    baseNameEl.addEventListener('input', render);
    dateTextEl.addEventListener('input', render);
    tCategoryEl.addEventListener('change', render);

    render();
  </script>
</body>
</html>
