<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MooDeng!!</title>

<style>
:root{
  --bg:#f4f6ff;
  --card:#ffffff;
  --line:#d6dcff;
  --primary:#6c8cff;
  --accent:#ff6b9a;
  --text:#2b2d42;
  --muted:#8d99ae;
}

body.dark{
  --bg:#05070d;
  --card:#081633;
  --line:#3a67a0;
  --primary:#3a67ff;
  --accent:#ff3b3b;
  --text:#f8fafc;
  --muted:#9fb0c8;
}

body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
}

.theme-btn{
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  background:var(--primary);
  color:#fff;
}

#menuBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:52px;
  height:52px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  font-size:20px;
  cursor:pointer;
  z-index:1001;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

#overlay.show{
  display:block;
}

#sidebar{
  position:fixed;
  left:-320px;
  top:0;
  width:320px;
  height:100%;
  background:var(--card);
  transition:.3s;
  z-index:1000;
  display:flex;
  flex-direction:column;
  box-shadow:0 0 20px rgba(0,0,0,.15);
}

#sidebar.open{
  left:0;
}

.note-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.add-note-btn{
  border:none;
  width:32px;
  height:32px;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

.note-card.pinned{
  border:2px solid gold;
  background:rgba(255,215,0,0.1);
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
  overflow:auto;
}

.note-card{
  position:relative;
  border:2px dashed var(--line);
  border-radius:10px;
  padding:8px;
  font-size:12px;
  max-height:80px;
  overflow:hidden;
  cursor:pointer;
  background:var(--card);
}

.delete-btn{
  position:absolute;
  top:4px;
  right:6px;
  border:none;
  background:#ff5252;
  color:#fff;
  border-radius:6px;
  font-size:10px;
  padding:2px 6px;
  cursor:pointer;
}

.wrap{
  width:100%;
  margin:0;
  padding:20px 5cm;
  box-sizing:border-box;
}

.control{
  background:var(--card);
  border-radius:18px;
  padding:20px;
  margin-bottom:24px;
}

.control-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

label{
  font-size:13px;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
}

input,select{
  width:100%;
  padding:16px 18px;
  border-radius:16px;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--text);
  font-size:16px;
  box-sizing:border-box;
}

.category-box{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 120px 120px;
  gap:10px;
}

.category-box button{
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.add-btn{
  background:#4caf50;
  color:#fff;
}

.remove-btn{
  background:#ff5252;
  color:#fff;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.card{
  position:relative;
  background:var(--card);
  border-radius:16px;
  padding:14px 70px 14px 14px;
  cursor:pointer;
  transition:.15s;
  word-break:break-word;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
  overflow:hidden;
}

.card::after{
  content:'';
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  width:52px;
  height:52px;
  background-image:var(--icon);
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  opacity:.38;
  pointer-events:none;
}

.card:hover{
  transform:translateY(-2px);
}

.card:active{
  transform:scale(0.96);
  opacity:0.6;
}

h3{
  margin-top:28px;
}

@media(max-width:900px){

  .wrap{
    padding:20px;
  }

  .control-grid{
    grid-template-columns:1fr;
  }

  .category-box{
    grid-template-columns:1fr;
  }

  .notes-grid{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<div class="topbar">
  <h2>🐷 MooDeng!!</h2>
  <button id="themeBtn" class="theme-btn">🌙</button>
</div>

<button id="menuBtn">☰</button>

<div id="overlay"></div>

<div id="sidebar">

  <div class="note-header">
    <h3>Notes</h3>
    <button id="addNoteBtn" class="add-note-btn">＋</button>
  </div>

  <div id="notesContainer" class="notes-grid"></div>

</div>

<div class="wrap">

  <div class="control">

    <div class="control-grid">

      <div>
        <label>ชื่อ</label>
        <input id="baseName" value="John">
      </div>

      <div>
        <label>วันที่</label>
        <input id="dateText">
      </div>

      <div>
        <label>ประเภท</label>
        <select id="tCategory"></select>
      </div>

    </div>

    <div class="category-box">
      <input id="newCategory" placeholder="เพิ่ม Cloths / Body / Hat...">
      <button class="add-btn" id="addCategoryBtn">+ เพิ่ม</button>
      <button class="remove-btn" id="removeCategoryBtn">- ลบ</button>
    </div>

  </div>

  <h3>🧥 M</h3>
  <div id="mGroup" class="cards"></div>

  <h3>👕 CH</h3>
  <div id="chGroup" class="cards"></div>

  <h3>🎨 T</h3>
  <div id="tGroup" class="cards"></div>

</div>

<script>
(function(){

let categories =
JSON.parse(localStorage.getItem('categories')) ||
[
  'Cloths',
  'Pant',
  'Shirt',
  'Hat',
  'Shoe',
  'Body',
  'Glasses',
  'Jacket',
  'Boot'
];

let notes =
JSON.parse(localStorage.getItem('notes')) || [];

let theme =
localStorage.getItem('theme') || 'cute';

function applyTheme(){

  document.body.classList.toggle(
    'dark',
    theme === 'dark'
  );
}

applyTheme();

themeBtn.onclick = ()=>{

  theme = theme === 'dark'
    ? 'cute'
    : 'dark';

  localStorage.setItem('theme',theme);

  applyTheme();
};

function today(){

  const d = new Date();

  return String(d.getMonth()+1).padStart(2,'0') +
         String(d.getDate()).padStart(2,'0') +
         String(d.getFullYear()).slice(-2);
}

dateText.value = today();

function saveCategories(){

  localStorage.setItem(
    'categories',
    JSON.stringify(categories)
  );
}

function renderCategories(){

  tCategory.innerHTML='';

  categories.forEach(c=>{

    tCategory.add(
      new Option(c,c)
    );

  });
}

addCategoryBtn.onclick = ()=>{

  let v = newCategory.value.trim();

  if(!v || categories.includes(v)) return;

  categories.push(v);

  saveCategories();

  renderCategories();

  render();

  newCategory.value='';
};

removeCategoryBtn.onclick = ()=>{

  let v = tCategory.value;

  if(categories.length <= 1) return;

  categories =
  categories.filter(c=>c!==v);

  saveCategories();

  renderCategories();

  render();
};

function createCard(text){

  let d = document.createElement('div');

  d.className='card';

  d.textContent=text;

  let icon='';

  let parts =
  text.replace(/\n/g,'_')
      .split('_');

  let category =
  parts.join(' ').toLowerCase();

  /* ---------- SHOE ---------- */
  if(
    category.includes('shoe') ||
    category.includes('boot') ||
    category.includes('sneaker')
  ){
    icon='https://cdn-icons-png.flaticon.com/512/2589/2589903.png';
  }
    /* ---------- Sock ---------- */
  if(
    category.includes('sock') ||
    category.includes('Sock') 
  ){
    icon='https://cdn-icons-png.flaticon.com/512/2161/2161101.png';
  }
    /* ---------- Cloths ---------- */
  if(
    category.includes('cloths') ||
    category.includes('Cloths') 
  ){
    icon='https://cdn-icons-png.flaticon.com/512/7417/7417708.png';
  }
   /* ---------- Cloths ---------- */
  if(
    category.includes('sweather') ||
    category.includes('Sweather') 
  ){
    icon='https://cdn-icons-png.flaticon.com/512/1810/18109506.png';
  }
    /* ---------- Cloths ---------- */
  if(
    category.includes('gloves') ||
    category.includes('Gloves') 
  ){
    icon='https://cdn-icons-png.flaticon.com/512/1181/11818114.png';
  }
   /* ---------- Belt ---------- */
  if(
    category.includes('belt') ||
    category.includes('Belt') 
  ){
    icon='https://cdn-icons-png.flaticon.com/512/2777/2777903.png';
  }

  /* ---------- HAT ---------- */
  else if(
    category.includes('hat') ||
    category.includes('cap') ||
    category.includes('helmet')
  ){
    icon='https://cdn-icons-png.flaticon.com/512/2276/2276501.png';
  }

  /* ---------- SHIRT ---------- */
  else if(
    category.includes('shirt') ||
    category.includes('tshirt') ||
    category.includes('tee') ||
    category.includes('jacket') ||
    category.includes('hoodie')
  ){
    icon='https://cdn-icons-png.flaticon.com/512/7451/7451764.png';
  }

  /* ---------- PANT ---------- */
  else if(
    category.includes('pant') ||
    category.includes('pants') ||
    category.includes('jean') ||
    category.includes('short')
  ){
    icon='https://cdn-icons-png.flaticon.com/512/9643/9643719.png';
  }

  /* ---------- BODY ---------- */
  else if(
    category.includes('body') ||
    category.includes('skin') ||
    category.includes('face')
  ){
    icon='https://cdn-icons-png.flaticon.com/512/755/755258.png';
  }

  /* ---------- GLASSES ---------- */
  else if(
    category.includes('glass') ||
    category.includes('glasses')
  ){
    icon='https://cdn-icons-png.flaticon.com/512/921/921071.png';
  }

  /* ---------- DEFAULT ---------- */
  else{
    icon='https://cdn-icons-png.flaticon.com/512/1077/1077114.png';
  }

  d.style.setProperty(
    '--icon',
    `url(${icon})`
  );

  d.onclick=()=>{

    navigator.clipboard.writeText(
      text.replace(/\n/g,'')
    );

  };

  return d;
}

function render(){

  mGroup.innerHTML='';
  chGroup.innerHTML='';
  tGroup.innerHTML='';

  categories.forEach(c=>{

    mGroup.appendChild(
      createCard(
        `M_${baseName.value}_${c}`
      )
    );

    chGroup.appendChild(
      createCard(
        `CH_${baseName.value}_${c}`
      )
    );

  });

  ['BC','N','R','M'].forEach(s=>{

    tGroup.appendChild(
      createCard(
        `T_${baseName.value}\n${dateText.value}_${tCategory.value}_${s}`
      )
    );

  });
}

function saveNotes(){

  localStorage.setItem(
    'notes',
    JSON.stringify(notes)
  );
}

function renderNotes(){

  notesContainer.innerHTML='';

  let sorted = [...notes].sort(
    (a,b)=>
    (b.pinned===true) -
    (a.pinned===true)
  );

  sorted.forEach((n,index)=>{

    let d=document.createElement('div');

    d.className='note-card';

    if(n.pinned)
      d.classList.add('pinned');

    let text=document.createElement('div');

    text.textContent=n.text;

    let del=document.createElement('button');

    del.className='delete-btn';

    del.textContent='x';

    del.onclick=(e)=>{

      e.stopPropagation();

      if(confirm('ลบโน้ตนี้?')){

        notes.splice(index,1);

        saveNotes();

        renderNotes();
      }
    };

    d.onclick=()=>{

      navigator.clipboard.writeText(n.text);

    };

    d.ondblclick=()=>{

      let newText =
      prompt('แก้ไขโน้ต',n.text);

      if(!newText) return;

      n.text = newText.trim();

      saveNotes();

      renderNotes();
    };

    d.oncontextmenu=(e)=>{

      e.preventDefault();

      n.pinned = !n.pinned;

      saveNotes();

      renderNotes();
    };

    d.appendChild(text);

    d.appendChild(del);

    notesContainer.appendChild(d);

  });
}

addNoteBtn.onclick=()=>{

  let text = prompt('พิมพ์โน้ต');

  if(!text) return;

  notes.unshift({
    text:text.trim(),
    pinned:false
  });

  saveNotes();

  renderNotes();
};

menuBtn.onclick=()=>{

  sidebar.classList.toggle('open');

  overlay.classList.toggle('show');
};

overlay.onclick=()=>{

  sidebar.classList.remove('open');

  overlay.classList.remove('show');
};

sidebar.onclick=(e)=>e.stopPropagation();

renderCategories();

render();

renderNotes();

baseName.oninput=render;

tCategory.onchange=render;

})();
</script>

</body>
</html>
