<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Rename Tool</title>

<style>
:root{
  --bg:#05070d;
  --panel:#081633;
  --input:#07163b;
  --line:#3a67a0;
  --text:#f8fafc;
  --muted:#9fb0c8;
  --red:#ff3b3b;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* FULL WIDTH */
.wrap{
  width:100%;
  padding:16px;
}

/* MENU */
#menuBtn{
  position:fixed;
  top:12px;
  left:12px;
  z-index:1100;
}

/* DRAWER */
#sidebar{
  position:fixed;
  top:0;
  left:-320px;
  width:320px;
  height:100%;
  background:var(--panel);
  transition:.3s;
  z-index:1000;
  display:flex;
  flex-direction:column;
}
#sidebar.open{left:0;}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}
#overlay.show{display:block;}

/* NOTES */
#notesPanel{
  flex:1;
  padding:12px;
  overflow:auto;
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.note-card{
  background:#0b1f55;
  border:2px solid var(--line);
  border-radius:12px;
  padding:10px;
  cursor:pointer;
  position:relative;
}

.note-card:hover{
  border-color:var(--red);
}

.note-text{
  white-space:pre-wrap;
}

.note-delete{
  position:absolute;
  top:4px;
  right:6px;
  cursor:pointer;
}

/* ADD BTN */
#addNoteBtn{
  position:absolute;
  bottom:16px;
  right:16px;
  width:50px;
  height:50px;
  border-radius:50%;
  font-size:22px;
  background:var(--red);
}

/* TOOL */
.topbar,.topbar-add{
  display:grid;
  gap:10px;
  margin-bottom:12px;
}

.topbar{grid-template-columns:repeat(3,1fr);}
.topbar-add{grid-template-columns:1fr 200px;}

input,select,button{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:var(--input);
  color:white;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;
}

.card{
  background:#081633;
  border:2px solid var(--red);
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.card-top{white-space:pre-line;font-weight:bold;}
.card-sub{font-size:12px;color:var(--muted);}
</style>
</head>

<body>

<button id="menuBtn">☰</button>

<div id="overlay"></div>

<div id="sidebar">
  <h3 style="padding:10px;">Notes</h3>

  <div id="notesPanel">
    <div id="notesContainer" class="notes-grid"></div>
  </div>

  <button id="addNoteBtn">+</button>
</div>

<div class="wrap">

<h2>Batch Rename Tool</h2>

<div class="topbar">
  <input id="baseName" value="John">
  <input id="dateText">
  <select id="tCategory"></select>
</div>

<div class="topbar-add">
  <input id="newCategory">
  <button id="addCategoryBtn">+ เพิ่ม</button>
</div>

<div class="topbar-add">
  <select id="removeCategory"></select>
  <button id="removeCategoryBtn">- ลบ</button>
</div>

<h3>M</h3>
<div id="mGroup" class="cards"></div>

<h3>CH</h3>
<div id="chGroup" class="cards"></div>

<h3>T</h3>
<div id="tGroup" class="cards"></div>

</div>

<script>
(function(){

let categories=JSON.parse(localStorage.getItem('cats'))||['Cloths','Pant','Shirt'];
let notes=JSON.parse(localStorage.getItem('notes'))||[];

const baseNameEl=document.getElementById('baseName');
const dateTextEl=document.getElementById('dateText');
const tCategoryEl=document.getElementById('tCategory');
const removeCategoryEl=document.getElementById('removeCategory');

const mGroup=document.getElementById('mGroup');
const chGroup=document.getElementById('chGroup');
const tGroup=document.getElementById('tGroup');

const notesContainer=document.getElementById('notesContainer');

/* DATE (SMART UPDATE) */
function getToday(){
  const d=new Date();
  return String(d.getMonth()+1).padStart(2,'0')+
         String(d.getDate()).padStart(2,'0')+
         String(d.getFullYear()).slice(-2);
}

let lastDate='';
setInterval(()=>{
  const now=getToday();
  if(now!==lastDate){
    dateTextEl.value=now;
    render();
    lastDate=now;
  }
},1000);

/* CATEGORY */
function renderCategories(){
  tCategoryEl.innerHTML='';
  removeCategoryEl.innerHTML='';
  categories.forEach(c=>{
    tCategoryEl.add(new Option(c,c));
    removeCategoryEl.add(new Option(c,c));
  });
}

/* CARDS */
function build(p,c){
  return p+'_'+baseNameEl.value+'\n'+dateTextEl.value+'_'+c;
}

function card(text){
  let d=document.createElement('div');
  d.className='card';
  d.innerHTML='<div class="card-top">'+text+'</div><div class="card-sub">copy</div>';
  d.onclick=()=>navigator.clipboard.writeText(text.replace(/\n/g,''));
  return d;
}

function render(){
  mGroup.innerHTML='';
  chGroup.innerHTML='';
  tGroup.innerHTML='';

  categories.forEach(c=>{
    mGroup.appendChild(card(build('M',c)));
    chGroup.appendChild(card(build('CH',c)));
  });

  ['BC','N','R','M'].forEach(s=>{
    tGroup.appendChild(card(build('T',tCategoryEl.value)+'_'+s));
  });
}

/* CATEGORY BTN */
addCategoryBtn.onclick=()=>{
  let v=newCategory.value.trim();
  if(v){categories.push(v);renderCategories();render();}
};

removeCategoryBtn.onclick=()=>{
  categories=categories.filter(c=>c!==removeCategoryEl.value);
  renderCategories();render();
};

baseNameEl.oninput=render;
tCategoryEl.onchange=render;

/* NOTES (drag + edit) */
function saveNotes(){
  localStorage.setItem('notes',JSON.stringify(notes));
}

let dragIndex=null;

function renderNotes(){
  notesContainer.innerHTML='';

  notes.forEach((n,i)=>{
    let d=document.createElement('div');
    d.className='note-card';
    d.draggable=true;

    let txt=document.createElement('div');
    txt.className='note-text';
    txt.textContent=n||'(empty)';

    let del=document.createElement('div');
    del.className='note-delete';
    del.textContent='X';

    del.onclick=(e)=>{
      e.stopPropagation();
      notes.splice(i,1);
      saveNotes();
      renderNotes();
    };

    d.onclick=()=>navigator.clipboard.writeText(n);

    d.ondblclick=(e)=>{
      e.stopPropagation();
      let newText=prompt('แก้ไขโน้ต',n);
      if(newText!==null){
        notes[i]=newText;
        saveNotes();
        renderNotes();
      }
    };

    d.ondragstart=()=>{
      dragIndex=i;
      d.style.opacity=0.5;
    };

    d.ondragend=()=>d.style.opacity=1;

    d.ondragover=(e)=>e.preventDefault();

    d.ondrop=(e)=>{
      e.preventDefault();
      if(dragIndex===i) return;

      const moved=notes.splice(dragIndex,1)[0];
      notes.splice(i,0,moved);

      saveNotes();
      renderNotes();
    };

    d.append(txt,del);
    notesContainer.appendChild(d);
  });
}

addNoteBtn.onclick=()=>{
  let text=prompt('ใส่ข้อความโน้ต');
  if(text!==null){
    notes.unshift(text);
    saveNotes();
    renderNotes();
  }
};

/* DRAWER */
menuBtn.onclick=()=>{
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
};

overlay.onclick=()=>{
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
};

/* INIT */
renderCategories();
render();
renderNotes();

})();
</script>

</body>
</html>
