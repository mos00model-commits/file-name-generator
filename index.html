<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Name Cards</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0f14;
      color: #e5e7eb;
    }

    .wrap {
      max-width: 1400px;
      margin: 24px auto;
      padding: 20px;
    }

    .panel {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      color: #f9fafb;
    }

    .desc {
      margin: 0 0 20px;
      color: #9ca3af;
      line-height: 1.6;
      font-size: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 12px 16px;
      align-items: center;
      margin-bottom: 22px;
    }

    label {
      font-weight: 700;
      color: #f3f4f6;
      font-size: 18px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #374151;
      border-radius: 12px;
      font-size: 18px;
      background: #0f172a;
      color: #f9fafb;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.18);
    }

    .hint {
      grid-column: 2 / 3;
      margin-top: -6px;
      color: #94a3b8;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }

    .main-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-secondary {
      background: #374151;
      color: #fff;
    }

    .section-title {
      margin: 24px 0 14px;
      font-size: 20px;
      font-weight: 700;
      color: #f9fafb;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .card {
      background: #0f172a;
      border: 2px solid #ef4444;
      border-radius: 18px;
      padding: 16px;
      min-height: 120px;
      min-width: 220px;
      flex: 1 1 220px;
      color: #f9fafb;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #f87171;
      box-shadow: 0 10px 18px rgba(0,0,0,0.28);
    }

    .card.active {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.14);
    }

    .line1,
    .line2 {
      font-family: Consolas, monospace;
      font-size: 28px;
      line-height: 1.25;
      word-break: break-word;
    }

    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }

    .status {
      margin-top: 18px;
      min-height: 24px;
      color: #60a5fa;
      font-weight: 700;
      font-size: 16px;
    }

    @media (max-width: 800px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .hint {
        grid-column: auto;
      }

      .line1, .line2 {
        font-size: 22px;
      }

      .card {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>โปรแกรมเปลี่ยนชื่อไฟล์</h1>
      <p class="desc">
        เปลี่ยนชื่อและวันที่ครั้งเดียว แล้วอัปเดตทุกการ์ดพร้อมกันตามกลุ่ม M, CH และ T
      </p>

      <div class="controls">
        <label for="nameInput">ชื่อใหม่</label>
        <input id="nameInput" type="text" value="John" placeholder="เช่น John" />

        <label for="dateInput">วันที่ใหม่</label>
        <input id="dateInput" type="text" value="20260311" placeholder="เช่น 20260311" />
        <div class="hint">แนะนำรูปแบบวันที่: YYYYMMDD เช่น 20260311</div>

        <label for="tTypeSelect">ประเภทของ T_</label>
        <select id="tTypeSelect">
          <option selected>Cloths</option>
          <option>Pant</option>
          <option>Shirt</option>
          <option>Sock</option>
          <option>Shoe</option>
        </select>
      </div>

      <div class="actions">
        <button class="main-btn btn-primary" onclick="copySelected()">คัดลอกใบที่เลือก</button>
        <button class="main-btn btn-secondary" onclick="copyAll()">คัดลอกทั้งหมด</button>
      </div>

      <div class="section-title">กลุ่ม M</div>
      <div id="mGrid" class="cards"></div>

      <div class="section-title">กลุ่ม CH</div>
      <div id="chGrid" class="cards"></div>

      <div class="section-title">กลุ่ม T</div>
      <div id="tGrid" class="cards"></div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const mTypes = ["Cloths", "Shirt", "Sock", "Shoe"];
    const chTypes = ["Pant", "Cloths", "Shirt", "Sock", "Shoe"];
    const tSlots = ["N", "R", "M"];
    let selectedValue = "";

    function sanitizeName(value) {
      return value.trim().replace(/\s+/g, "").replace(/[^A-Za-z0-9ก-๙_-]/g, "");
    }

    function sanitizeDate(value) {
      return value.trim().replace(/[^0-9-]/g, "");
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function createCard(line1, line2, fullValue) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="line1">${line1}</div>
        <div class="line2">${line2}</div>
        <div class="meta">คลิกเพื่อเลือกและคัดลอก</div>
      `;

      card.addEventListener("click", () => {
        document.querySelectorAll(".card").forEach(el => el.classList.remove("active"));
        card.classList.add("active");
        selectedValue = fullValue;
        setStatus("เลือกแล้ว: " + fullValue);
      });

      return card;
    }

    function renderCards() {
      const name = sanitizeName(document.getElementById("nameInput").value) || "John";
      const date = sanitizeDate(document.getElementById("dateInput").value) || "20260311";
      const tType = document.getElementById("tTypeSelect").value || "Cloths";

      const mGrid = document.getElementById("mGrid");
      const chGrid = document.getElementById("chGrid");
      const tGrid = document.getElementById("tGrid");

      mGrid.innerHTML = "";
      chGrid.innerHTML = "";
      tGrid.innerHTML = "";
      selectedValue = "";

      mTypes.forEach(type => {
        const line1 = `M_${name}`;
        const line2 = `${date}_${type}_BC`;
        const fullValue = `${line1}_${line2}`;
        mGrid.appendChild(createCard(line1, line2, fullValue));
      });

      chTypes.forEach(type => {
        const line1 = `CH_${name}`;
        const line2 = `${date}_${type}_BC`;
        const fullValue = `${line1}_${line2}`;
        chGrid.appendChild(createCard(line1, line2, fullValue));
      });

      tSlots.forEach(slot => {
        const line1 = `T_${name}`;
        const line2 = `${date}_${tType}_${slot}`;
        const fullValue = `${line1}_${line2}`;
        tGrid.appendChild(createCard(line1, line2, fullValue));
      });

      setStatus("อัปเดตทุกการ์ดแล้ว");
    }

    async function copySelected() {
      if (!selectedValue) {
        setStatus("ยังไม่ได้เลือกการ์ด");
        return;
      }

      try {
        await navigator.clipboard.writeText(selectedValue);
        setStatus("คัดลอกแล้ว: " + selectedValue);
      } catch (err) {
        setStatus("คัดลอกไม่สำเร็จ");
      }
    }

    async function copyAll() {
      const values = Array.from(document.querySelectorAll(".card")).map(card => {
        const line1 = card.querySelector(".line1").textContent.trim();
        const line2 = card.querySelector(".line2").textContent.trim();
        return `${line1}_${line2}`;
      });

      try {
        await navigator.clipboard.writeText(values.join("\n"));
        setStatus("คัดลอกทั้งหมดแล้ว");
      } catch (err) {
        setStatus("คัดลอกทั้งหมดไม่สำเร็จ");
      }
    }

    document.getElementById("nameInput").addEventListener("input", renderCards);
    document.getElementById("dateInput").addEventListener("input", renderCards);
    document.getElementById("tTypeSelect").addEventListener("change", renderCards);

    renderCards();
  </script>
</body>
</html>
