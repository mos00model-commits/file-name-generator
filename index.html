<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Rename Tool</title>

<style>
:root{
  --bg:#05070d;
  --panel:#081633;
  --input:#07163b;
  --line:#3a67a0;
  --text:#f8fafc;
  --muted:#9fb0c8;
  --red:#ff3b3b;
}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== FLOAT BUTTON ===== */
#menuBtn{
  position:fixed;
  bottom:16px;
  left:16px;
  z-index:1100;
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:var(--red);
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* ===== SIDEBAR ===== */
#sidebar{
  position:fixed;
  top:0;
  left:-320px;
  width:320px;
  height:100%;
  background:var(--panel);
  transition:.3s;
  z-index:1000;
  display:flex;
  flex-direction:column;
}
#sidebar.open{left:0;}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  z-index:999;
}
#overlay.show{display:block;}

/* ===== NOTES ===== */
#notesPanel{
  flex:1;
  padding:12px;
  overflow:auto;
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.note-card{
  background:#0b1f55;
  border:2px solid var(--line);
  border-radius:12px;
  padding:10px;
  cursor:pointer;
  position:relative;
}

.note-card:hover{border-color:var(--red);}

.note-text{white-space:pre-wrap;}

.note-delete{
  position:absolute;
  top:4px;
  right:6px;
  cursor:pointer;
}

#addNoteBtn{
  position:absolute;
  bottom:16px;
  right:16px;
  width:46px;
  height:46px;
  border-radius:50%;
  border:none;
  background:var(--red);
  color:white;
  font-size:20px;
  cursor:pointer;
}

/* ===== MAIN (CENTERED) ===== */
.wrap{
  max-width:1200px;   /* 👈 ทำให้การ์ดอยู่กลาง */
  margin:0 auto;
  padding:18px 24px;
}

.topbar,.topbar-add{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:14px;
  margin-bottom:20px;
}

input,select,button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--input);
  color:white;
}

/* ===== CARDS ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:16px;
}

.card{
  background:#081633;
  border:2px solid var(--red);
  padding:14px;
  border-radius:14px;
  cursor:pointer;
}

.card-top{
  white-space:pre-line;
  font-size:18px;
  font-weight:bold;
}

.card-sub{
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<button id="menuBtn">☰</button>

<div id="overlay"></div>

<div id="sidebar">
  <h3 style="padding:10px;">Notes</h3>

  <div id="notesPanel">
    <div id="notesContainer" class="notes-grid"></div>
  </div>

  <button id="addNoteBtn">+</button>
</div>

<div class="wrap">

<h2>Batch Rename Tool</h2>

<div class="topbar">
  <input id="baseName" value="John">
  <input id="dateText">
  <select id="tCategory"></select>
</div>

<div class="topbar-add">
  <input id="newCategory">
  <button id="addCategoryBtn">+ เพิ่ม</button>
</div>

<div class="topbar-add">
  <select id="removeCategory"></select>
  <button id="removeCategoryBtn">- ลบ</button>
</div>

<h3>M</h3>
<div id="mGroup" class="cards"></div>

<h3>CH</h3>
<div id="chGroup" class="cards"></div>

<h3>T</h3>
<div id="tGroup" class="cards"></div>

</div>

<script>
(function(){

let categories=['Cloths','Pant','Shirt'];
let notes=JSON.parse(localStorage.getItem('notes'))||[];

const baseNameEl=document.getElementById('baseName');
const dateTextEl=document.getElementById('dateText');
const tCategoryEl=document.getElementById('tCategory');
const removeCategoryEl=document.getElementById('removeCategory');

const mGroup=document.getElementById('mGroup');
const chGroup=document.getElementById('chGroup');
const tGroup=document.getElementById('tGroup');

const notesContainer=document.getElementById('notesContainer');

/* DATE */
function getToday(){
  const d=new Date();
  return String(d.getMonth()+1).padStart(2,'0')+
         String(d.getDate()).padStart(2,'0')+
         String(d.getFullYear()).slice(-2);
}

let last='';
setInterval(()=>{
  const now=getToday();
  if(now!==last){
    dateTextEl.value=now;
    render();
    last=now;
  }
},1000);

/* CATEGORY */
function renderCategories(){
  tCategoryEl.innerHTML='';
  removeCategoryEl.innerHTML='';
  categories.forEach(c=>{
    tCategoryEl.add(new Option(c,c));
    removeCategoryEl.add(new Option(c,c));
  });
}

/* CARD */
function build(p,c){
  return p+'_'+baseNameEl.value+'\n'+dateTextEl.value+'_'+c;
}

function card(text){
  let d=document.createElement('div');
  d.className='card';
  d.innerHTML='<div class="card-top">'+text+'</div><div class="card-sub">copy</div>';
  d.onclick=()=>navigator.clipboard.writeText(text.replace(/\n/g,''));
  return d;
}

function render(){
  mGroup.innerHTML='';
  chGroup.innerHTML='';
  tGroup.innerHTML='';

  categories.forEach(c=>{
    mGroup.appendChild(card(build('M',c)));
    chGroup.appendChild(card(build('CH',c)));
  });

  ['BC','N','R','M'].forEach(s=>{
    tGroup.appendChild(card(build('T',tCategoryEl.value)+'_'+s));
  });
}

/* CATEGORY BTN */
addCategoryBtn.onclick=()=>{
  let v=newCategory.value.trim();
  if(v){categories.push(v);renderCategories();render();}
};

removeCategoryBtn.onclick=()=>{
  categories=categories.filter(c=>c!==removeCategoryEl.value);
  renderCategories();render();
};

baseNameEl.oninput=render;
tCategoryEl.onchange=render;

/* NOTES */
function saveNotes(){
  localStorage.setItem('notes',JSON.stringify(notes));
}

let dragIndex=null;

function renderNotes(){
  notesContainer.innerHTML='';

  notes.forEach((n,i)=>{
    let d=document.createElement('div');
    d.className='note-card';
    d.draggable=true;

    let txt=document.createElement('div');
    txt.className='note-text';
    txt.textContent=n;

    let del=document.createElement('div');
    del.className='note-delete';
    del.textContent='X';

    del.onclick=(e)=>{
      e.stopPropagation();
      notes.splice(i,1);
      saveNotes();
      renderNotes();
    };

    d.onclick=()=>navigator.clipboard.writeText(n);

    d.ondblclick=(e)=>{
      e.stopPropagation();
      let t=prompt('แก้ไขโน้ต',n);
      if(t!==null){
        notes[i]=t;
        saveNotes();
        renderNotes();
      }
    };

    d.ondragstart=()=>dragIndex=i;
    d.ondragover=(e)=>e.preventDefault();
    d.ondrop=()=>{
      const moved=notes.splice(dragIndex,1)[0];
      notes.splice(i,0,moved);
      saveNotes();
      renderNotes();
    };

    d.append(txt,del);
    notesContainer.appendChild(d);
  });
}

addNoteBtn.onclick=()=>{
  let t=prompt('เพิ่มโน้ต');
  if(t!==null){
    notes.unshift(t);
    saveNotes();
    renderNotes();
  }
};

/* SIDEBAR */
menuBtn.onclick=()=>{
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
};

overlay.onclick=()=>{
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
};

/* INIT */
renderCategories();
render();
renderNotes();

})();
</script>

</body>
</html>
