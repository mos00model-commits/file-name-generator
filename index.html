<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Name Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0f14;
      color: #e5e7eb;
    }
    .wrap {
      max-width: 1280px;
      margin: 24px auto;
      padding: 20px;
    }
    .panel {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #f9fafb;
    }
    .desc {
      margin: 0 0 18px;
      color: #9ca3af;
      line-height: 1.6;
    }
    .controls {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 12px 16px;
      align-items: center;
      margin-bottom: 20px;
    }
    label {
      font-weight: 700;
      color: #f3f4f6;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #374151;
      border-radius: 12px;
      font-size: 16px;
      background: #0f172a;
      color: #f9fafb;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.18);
    }
    .hint {
      grid-column: 2 / 3;
      margin-top: -6px;
      color: #94a3b8;
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-secondary {
      background: #374151;
      color: #fff;
    }
    .section-title {
      margin: 18px 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #f9fafb;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }
    .grid-5 {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .card {
      background: #0f172a;
      border: 2px solid #ef4444;
      border-radius: 18px;
      padding: 16px;
      min-height: 118px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: #f87171;
      box-shadow: 0 10px 18px rgba(0,0,0,0.28);
    }
    .card.active {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.14);
    }
    .line1, .line2 {
      font-family: Consolas, monospace;
      font-size: 22px;
      line-height: 1.35;
      color: #f9fafb;
      word-break: break-word;
    }
    .meta {
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
    }
    .status {
      margin-top: 16px;
      min-height: 24px;
      color: #60a5fa;
      font-weight: 700;
    }
    @media (max-width: 1100px) {
      .grid-4, .grid-5 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 700px) {
      .controls { grid-template-columns: 1fr; }
      .hint { grid-column: auto; }
      .grid-4, .grid-5, .grid-3 { grid-template-columns: 1fr; }
      .line1, .line2 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>โปรแกรมเปลี่ยนชื่อไฟล์</h1>
      <p class="desc">
        เปลี่ยนชื่อและวันที่ครั้งเดียว แล้วระบบจะอัปเดตชื่อไฟล์ทุกใบพร้อมกันตามกลุ่ม <b>M</b>, <b>CH</b>, และ <b>T</b>
      </p>

      <div class="controls">
        <label for="nameInput">ชื่อใหม่</label>
        <input id="nameInput" type="text" placeholder="เช่น John" value="John" />

        <label for="dateInput">วันที่ใหม่</label>
        <input id="dateInput" type="text" placeholder="เช่น 20260311" value="20260311" />
        <div class="hint">แนะนำรูปแบบวันที่: YYYYMMDD เช่น 20260311</div>

        <label for="tTypeSelect">ประเภทของ T_</label>
        <select id="tTypeSelect">
          <option selected>Cloths</option>
          <option>Pant</option>
          <option>Shirt</option>
          <option>Sock</option>
          <option>Shoe</option>
        </select>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="copySelected()">คัดลอกใบที่เลือก</button>
        <button class="btn-secondary" onclick="copyAll()">คัดลอกทั้งหมด</button>
      </div>

      <div class="section-title">กลุ่ม M</div>
      <div id="mGrid" class="grid-4"></div>

      <div class="section-title">กลุ่ม CH</div>
      <div id="chGrid" class="grid-5"></div>

      <div class="section-title">กลุ่ม T</div>
      <div id="tGrid" class="grid-3"></div>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const mTypes = ['Cloths', 'Shirt', 'Sock', 'Shoe'];
    const chTypes = ['Pant', 'Cloths', 'Shirt', 'Sock', 'Shoe'];
    const tSlots = ['N', 'R', 'M'];
    let selectedValue = '';

    function sanitizeName(value) {
      return value.trim().replace(/\s+/g, '').replace(/[^A-Za-z0-9ก-๙_-]/g, '');
    }

    function sanitizeDate(value) {
      return value.trim().replace(/[^0-9-]/g, '');
    }

    function buildTopLine(prefix, name) {
      return `${prefix}_${name}`;
    }

    function buildBottomLine(date, type, suffix = 'BC') {
      return `${date}_${type}_${suffix}`;
    }

    function buildTBottomLine(date, type, slot) {
      return `${date}_${type}_${slot}`;
    }

    function createCard(line1, line2, rawValue) {
      const btn = document.createElement('button');
      btn.className = 'card';
      btn.type = 'button';
      btn.innerHTML = `
        <div>
          <div class="line1">${line1}</div>
          <div class="line2">${line2}</div>
        </div>
        <div class="meta">คลิกเพื่อเลือกใบนี้</div>
      `;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        selectedValue = rawValue;
        setStatus(\`เลือกแล้ว: \${rawValue}\`);
      });
      return btn;
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function renderCards() {
      const name = sanitizeName(document.getElementById('nameInput').value) || 'John';
      const date = sanitizeDate(document.getElementById('dateInput').value) || '20260311';
      const tType = document.getElementById('tTypeSelect').value || 'Cloths';

      const mGrid = document.getElementById('mGrid');
      const chGrid = document.getElementById('chGrid');
      const tGrid = document.getElementById('tGrid');

      mGrid.innerHTML = '';
      chGrid.innerHTML = '';
      tGrid.innerHTML = '';
      selectedValue = '';

      mTypes.forEach(type => {
        const line1 = buildTopLine('M', name);
        const line2 = buildBottomLine(date, type);
        const raw = `${line1}_${line2}`;
        mGrid.appendChild(createCard(line1, line2, raw));
      });

      chTypes.forEach(type => {
        const line1 = buildTopLine('CH', name);
        const line2 = buildBottomLine(date, type);
        const raw = `${line1}_${line2}`;
        chGrid.appendChild(createCard(line1, line2, raw));
      });

      tSlots.forEach(slot => {
        const line1 = buildTopLine('T', name);
        const line2 = buildTBottomLine(date, tType, slot);
        const raw = `${line1}_${line2}`;
        tGrid.appendChild(createCard(line1, line2, raw));
      });

      setStatus('อัปเดตทุกใบแล้ว');
    }

    async function copySelected() {
      if (!selectedValue) {
        setStatus('ยังไม่ได้เลือกใบที่จะคัดลอก');
        return;
      }
      try {
        await navigator.clipboard.writeText(selectedValue);
        setStatus(`คัดลอกแล้ว: ${selectedValue}`);
      } catch (err) {
        setStatus('คัดลอกไม่สำเร็จ');
      }
    }

    async function copyAll() {
      const values = Array.from(document.querySelectorAll('.card')).map(card => {
        const l1 = card.querySelector('.line1').textContent.trim();
        const l2 = card.querySelector('.line2').textContent.trim();
        return `${l1}_${l2}`;
      });

      try {
        await navigator.clipboard.writeText(values.join('\\n'));
        setStatus('คัดลอกชื่อไฟล์ทั้งหมดแล้ว');
      } catch (err) {
        setStatus('คัดลอกทั้งหมดไม่สำเร็จ');
      }
    }

    document.getElementById('nameInput').addEventListener('input', renderCards);
    document.getElementById('dateInput').addEventListener('input', renderCards);
    document.getElementById('tTypeSelect').addEventListener('change', renderCards);

    renderCards();
  </script>
</body>
</html>
