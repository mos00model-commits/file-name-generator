<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Rename Tool</title>
  <style>
    :root {
      --bg: #05070d;
      --input: #07163b;
      --line: #3a67a0;
      --text: #f8fafc;
      --muted: #9fb0c8;
      --red: #ff3b3b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1380px;
      margin: 0 auto;
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 220px 220px 220px;
      gap: 14px;
      margin-bottom: 20px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 7px;
      font-weight: 600;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--input);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    .group-title {
      font-size: 20px;
      font-weight: 800;
      margin: 24px 0 12px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }

    .card {
      background: #081633;
      border: 2px solid var(--red);
      border-radius: 20px;
      padding: 18px;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card.copied {
      box-shadow: 0 0 0 2px rgba(255, 59, 59, 0.22), 0 0 18px rgba(255, 59, 59, 0.28);
    }

    .card-top {
      font-size: 21px;
      font-weight: 800;
      line-height: 1.35;
      white-space: pre-line;
      word-break: break-word;
    }

    .card-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 14px;
    }

    @media (max-width: 1080px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .topbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Batch Rename Tool</h1>
    <div class="sub">เปลี่ยนชื่อและวันที่ครั้งเดียว และกดการ์ดเพื่อคัดลอกได้ทันที</div>

    <div class="topbar">
      <div class="field">
        <label for="baseName">ชื่อ</label>
        <input id="baseName" value="John" />
      </div>

      <div class="field">
        <label for="dateText">วันที่</label>
        <input id="dateText" value="031126" />
      </div>

      <div class="field">
        <label for="tCategory">ประเภทของ T_</label>
        <select id="tCategory">
          <option value="Cloths">Cloths</option>
          <option value="Pant">Pant</option>
          <option value="Shirt" selected>Shirt</option>
          <option value="Sock">Sock</option>
          <option value="Shoe">Shoe</option>
        </select>
      </div>
    </div>

    <div class="group-title">กลุ่ม M</div>
    <div class="cards" id="mGroup"></div>

    <div class="group-title">กลุ่ม CH</div>
    <div class="cards" id="chGroup"></div>

    <div class="group-title">กลุ่ม T</div>
    <div class="cards" id="tGroup"></div>
  </div>

  <script>
    (function () {
      const categories = ['Cloths', 'Pant', 'Shirt', 'Sock', 'Shoe'];

      const mGroup = document.getElementById('mGroup');
      const chGroup = document.getElementById('chGroup');
      const tGroup = document.getElementById('tGroup');

      const baseNameEl = document.getElementById('baseName');
      const dateTextEl = document.getElementById('dateText');
      const tCategoryEl = document.getElementById('tCategory');

      const currentData = {
        M: [],
        CH: [],
        T: []
      };

      function buildData() {
        const name = (baseNameEl.value || 'John').trim() || 'John';
        const date = (dateTextEl.value || '031126').trim() || '031126';
        const tCategory = tCategoryEl.value || 'Shirt';

        currentData.M = categories.map(function (cat) {
          return 'M_' + name + '_' + '\n' + date + '_' + cat;
        });

        currentData.CH = categories.map(function (cat) {
          return 'CH_' + name + '_' + '\n' + date + '_' + cat;
        });

        currentData.T = [
          'T_' + name + '_' + '\n' + date + '_' + tCategory + '_BC',
          'T_' + name + '_' + '\n' + date + '_' + tCategory + '_N',
          'T_' + name + '_' + '\n' + date + '_' + tCategory + '_R',
          'T_' + name + '_' + '\n' + date + '_' + tCategory + '_M'
        ];
      }

      function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          return navigator.clipboard.writeText(text);
        }

        return new Promise(function (resolve, reject) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.setAttribute('readonly', 'readonly');
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          textarea.style.pointerEvents = 'none';
          document.body.appendChild(textarea);
          textarea.focus();
          textarea.select();

          try {
            const ok = document.execCommand('copy');
            document.body.removeChild(textarea);
            if (ok) {
              resolve();
            } else {
              reject(new Error('copy failed'));
            }
          } catch (error) {
            document.body.removeChild(textarea);
            reject(error);
          }
        });
      }

      function createCard(text) {
        const card = document.createElement('div');
        card.className = 'card';

        const top = document.createElement('div');
        top.className = 'card-top';
        top.textContent = text;

        const sub = document.createElement('div');
        sub.className = 'card-sub';
        sub.textContent = 'คลิกเพื่อคัดลอกทันที';

        card.appendChild(top);
        card.appendChild(sub);

        card.addEventListener('click', function () {
          const copyValue = text.replace(/\n/g, '');

          copyText(copyValue)
            .then(function () {
              card.classList.add('copied');
              sub.textContent = 'คัดลอกแล้ว';
              setTimeout(function () {
                card.classList.remove('copied');
                sub.textContent = 'คลิกเพื่อคัดลอกทันที';
              }, 900);
            })
            .catch(function () {
              sub.textContent = 'คัดลอกไม่สำเร็จ';
              setTimeout(function () {
                sub.textContent = 'คลิกเพื่อคัดลอกทันที';
              }, 1200);
            });
        });

        return card;
      }

      function renderGroup(container, list) {
        container.innerHTML = '';
        list.forEach(function (item) {
          container.appendChild(createCard(item));
        });
      }

      function render() {
        buildData();
        renderGroup(mGroup, currentData.M);
        renderGroup(chGroup, currentData.CH);
        renderGroup(tGroup, currentData.T);
      }

      baseNameEl.addEventListener('input', render);
      dateTextEl.addEventListener('input', render);
      tCategoryEl.addEventListener('change', render);

      render();
    })();
  </script>
</body>
</html>
