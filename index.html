<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MooDeng!!</title>

<style>
:root{
  --bg:#f4f6ff;
  --card:#ffffff;
  --line:#d6dcff;
  --primary:#6c8cff;
  --accent:#ff6b9a;
  --text:#2b2d42;
  --muted:#8d99ae;
}

body.dark{
  --bg:#05070d;
  --card:#081633;
  --line:#3a67a0;
  --primary:#3a67ff;
  --accent:#ff3b3b;
  --text:#f8fafc;
  --muted:#9fb0c8;
}

body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--text);
}

.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 20px;
}

.theme-btn{
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  background:var(--primary);
  color:#fff;
}

#menuBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:52px;
  height:52px;
  border:none;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  font-size:20px;
  cursor:pointer;
  z-index:1001;
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}
#overlay.show{display:block;}

#sidebar{
  position:fixed;
  left:-320px;
  top:0;
  width:320px;
  height:100%;
  background:var(--card);
  transition:.3s;
  z-index:1000;
  display:flex;
  flex-direction:column;
}
#sidebar.open{left:0;}

.note-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.add-note-btn{
  border:none;
  width:32px;
  height:32px;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

/* 🔥 PIN STYLE */
.note-card.pinned{
  border:2px solid gold;
  background:rgba(255,215,0,0.1);
}

.notes-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
  overflow:auto;
}

.note-card{
  border:2px dashed var(--line);
  border-radius:10px;
  padding:8px;
  font-size:12px;
  max-height:80px;
  overflow:hidden;
  cursor:pointer;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.control{
  background:var(--card);
  border-radius:18px;
  padding:20px;
  margin-bottom:24px;
}

.control-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

label{
  font-size:13px;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
}

input,select{
  width:100%;
  padding:16px 18px;
  border-radius:16px;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--text);
  font-size:16px;
}

.category-box{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 120px 120px;
  gap:10px;
}

.category-box button{
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.add-btn{background:#4caf50;color:#fff;}
.remove-btn{background:#ff5252;color:#fff;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:14px;
  cursor:pointer;
  transition:.1s;
}

.card:active{
  transform:scale(0.96);
  opacity:0.6;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>🐷 MooDeng!!</h2>
  <button id="themeBtn" class="theme-btn">🌙</button>
</div>

<button id="menuBtn">☰</button>

<div id="overlay"></div>

<div id="sidebar">
  <div class="note-header">
    <h3>Notes</h3>
    <button id="addNoteBtn" class="add-note-btn">＋</button>
  </div>

  <div id="notesContainer" class="notes-grid"></div>
</div>

<div class="wrap">

<div class="control">
  <div class="control-grid">
    <div>
      <label>ชื่อ</label>
      <input id="baseName" value="John">
    </div>

    <div>
      <label>วันที่</label>
      <input id="dateText">
    </div>

    <div>
      <label>ประเภท</label>
      <select id="tCategory"></select>
    </div>
  </div>

  <div class="category-box">
    <input id="newCategory" placeholder="เพิ่ม Cloths / Body / Hat...">
    <button class="add-btn" id="addCategoryBtn">+ เพิ่ม</button>
    <button class="remove-btn" id="removeCategoryBtn">- ลบ</button>
  </div>
</div>

<h3>🧥 M</h3>
<div id="mGroup" class="cards"></div>

<h3>👕 CH</h3>
<div id="chGroup" class="cards"></div>

<h3>🎨 T</h3>
<div id="tGroup" class="cards"></div>

</div>

<script>
(function(){

let categories=JSON.parse(localStorage.getItem('categories')) || ['Cloths','Pant','Shirt'];
let notes=JSON.parse(localStorage.getItem('notes')) || [];
let theme=localStorage.getItem('theme') || 'cute';

function applyTheme(){
  document.body.classList.toggle('dark',theme==='dark');
}
applyTheme();

themeBtn.onclick=()=>{
  theme = theme==='dark' ? 'cute' : 'dark';
  localStorage.setItem('theme',theme);
  applyTheme();
};

function today(){
  const d=new Date();
  return String(d.getMonth()+1).padStart(2,'0')+
         String(d.getDate()).padStart(2,'0')+
         String(d.getFullYear()).slice(-2);
}
dateText.value=today();

/* CATEGORY */
function saveCategories(){
  localStorage.setItem('categories',JSON.stringify(categories));
}

function renderCategories(){
  tCategory.innerHTML='';
  categories.forEach(c=>{
    tCategory.add(new Option(c,c));
  });
}

addCategoryBtn.onclick=()=>{
  let v=newCategory.value.trim();
  if(!v) return;
  if(categories.includes(v)) return;

  categories.push(v);
  saveCategories();
  renderCategories();
  render();
  newCategory.value='';
};

removeCategoryBtn.onclick=()=>{
  let v=tCategory.value;
  if(categories.length<=1) return;

  categories=categories.filter(c=>c!==v);
  saveCategories();
  renderCategories();
  render();
};

/* CARD */
function createCard(text){
  let d=document.createElement('div');
  d.className='card';

  let content=document.createElement('div');
  content.textContent=text;

  d.onclick=()=>{
    navigator.clipboard.writeText(text.replace(/\n/g,''));
  };

  d.appendChild(content);
  return d;
}

/* RENDER */
function render(){
  mGroup.innerHTML='';
  chGroup.innerHTML='';
  tGroup.innerHTML='';

  categories.forEach(c=>{
    mGroup.appendChild(createCard(`M_${baseName.value}\n${dateText.value}_${c}`));
    chGroup.appendChild(createCard(`CH_${baseName.value}\n${dateText.value}_${c}`));
  });

  ['BC','N','R','M'].forEach(s=>{
    tGroup.appendChild(createCard(`T_${baseName.value}\n${dateText.value}_${tCategory.value}_${s}`));
  });
}

/* NOTES */
function saveNotes(){
  localStorage.setItem('notes',JSON.stringify(notes));
}

function renderNotes(){
  notesContainer.innerHTML='';

  // 🔥 sort pinned first
  let sorted = [...notes].sort((a,b)=> (b.pinned===true) - (a.pinned===true));

  sorted.forEach(n=>{
    let d=document.createElement('div');
    d.className='note-card';
    if(n.pinned) d.classList.add('pinned');

    d.textContent=n.text;

    // copy
    d.onclick=()=>{
      navigator.clipboard.writeText(n.text);
    };

    // right click = pin/unpin
    d.oncontextmenu=(e)=>{
      e.preventDefault();
      n.pinned = !n.pinned;
      saveNotes();
      renderNotes();
    };

    notesContainer.appendChild(d);
  });
}

/* ADD NOTE */
addNoteBtn.onclick=()=>{
  let text=prompt('พิมพ์โน้ต');
  if(!text) return;

  notes.unshift({text:text.trim(), pinned:false});
  saveNotes();
  renderNotes();
};

/* SIDEBAR */
menuBtn.onclick=()=>{
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
};

overlay.onclick=()=>{
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
};

sidebar.onclick=(e)=>e.stopPropagation();

/* INIT */
renderCategories();
render();
renderNotes();

baseName.oninput=render;
tCategory.onchange=render;

})();
</script>

</body>
</html>
