<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch Rename Tool</title>
  <style>
    :root {
      --bg: #0b0b0d;
      --panel: #15161a;
      --panel-2: #1d1f25;
      --line: #2b2f38;
      --text: #f3f4f6;
      --muted: #9aa3b2;
      --accent: #ffffff;
      --chip: #242833;
      --ok: #10b981;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input, select, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .prefix-grid, .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .cat-grid {
      grid-template-columns: repeat(5, 1fr);
    }

    .chip-btn {
      background: var(--chip);
      cursor: pointer;
      transition: .2s ease;
    }

    .chip-btn.active {
      outline: 2px solid var(--accent);
      background: #2f3440;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .primary {
      background: #f3f4f6;
      color: #0b0b0d;
      font-weight: 700;
      cursor: pointer;
    }

    .ghost {
      background: transparent;
      cursor: pointer;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .preview-box {
      min-height: 420px;
      background: #111318;
      border: 1px dashed var(--line);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .file-card {
      border: 1px solid var(--line);
      background: #181b22;
      border-radius: 16px;
      padding: 14px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .file-card .top {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .file-card .bottom {
      color: #c8ced8;
      font-size: 14px;
      word-break: break-word;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .copy-row {
      margin-top: 14px;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Batch Rename Tool</h1>
    <div class="sub">เปลี่ยนชื่อ + เปลี่ยนวันที่ ทีเดียวทั้งชุด และจัดกลุ่มตาม Prefix ได้แบบที่วาดไว้</div>

    <div class="grid">
      <div class="panel">
        <h2>ตั้งค่าหลัก</h2>

        <div class="field">
          <label>ชื่อหลัก</label>
          <input id="baseName" value="John" />
        </div>

        <div class="field">
          <label>วันที่</label>
          <input id="dateText" value="031126" />
        </div>

        <div class="field">
          <label>เลือก Prefix ที่ต้องการสร้าง</label>
          <div class="prefix-grid">
            <button class="chip-btn active prefix-btn" data-prefix="M">M_</button>
            <button class="chip-btn active prefix-btn" data-prefix="CH">CH_</button>
            <button class="chip-btn active prefix-btn" data-prefix="T">T_</button>
          </div>
        </div>

        <div class="field">
          <label>หมวดสำหรับ M_ และ CH_</label>
          <div class="cat-grid">
            <button class="chip-btn active cat-main" data-cat="Cloths">Cloths</button>
            <button class="chip-btn active cat-main" data-cat="Pant">Pant</button>
            <button class="chip-btn active cat-main" data-cat="Shirt">Shirt</button>
            <button class="chip-btn active cat-main" data-cat="Sock">Sock</button>
            <button class="chip-btn active cat-main" data-cat="Shoe">Shoe</button>
          </div>
        </div>

        <div class="field">
          <label>หมวดสำหรับ T_ (แถบล่างสุด)</label>
          <div class="cat-grid">
            <button class="chip-btn active cat-t" data-cat="Cloths">Cloths</button>
            <button class="chip-btn cat-t" data-cat="Pant">Pant</button>
            <button class="chip-btn cat-t" data-cat="Shirt">Shirt</button>
            <button class="chip-btn cat-t" data-cat="Sock">Sock</button>
            <button class="chip-btn cat-t" data-cat="Shoe">Shoe</button>
          </div>
        </div>

        <div class="field">
          <label>Suffix ของ T_</label>
          <input id="tSuffix" value="BC" />
        </div>

        <div class="actions">
          <button class="primary" id="generateBtn">เปลี่ยนทั้งหมด</button>
          <button class="ghost" id="resetBtn">รีเซ็ต</button>
        </div>

        <div class="copy-row">
          <button class="ghost" id="copyBtn">คัดลอกผลลัพธ์ทั้งหมด</button>
        </div>
      </div>

      <div class="panel">
        <div class="preview-head">
          <h2 style="margin:0">ผลลัพธ์</h2>
          <div class="muted">อัปเดตพร้อมกันทุกกล่อง</div>
        </div>
        <div id="preview" class="preview-box"></div>
      </div>
    </div>
  </div>

  <script>
    const prefixButtons = document.querySelectorAll('.prefix-btn');
    const mainCats = document.querySelectorAll('.cat-main');
    const tCats = document.querySelectorAll('.cat-t');
    const preview = document.getElementById('preview');

    function toggleMulti(buttons) {
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          btn.classList.toggle('active');
          render();
        });
      });
    }

    function toggleSingle(buttons) {
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        });
      });
    }

    toggleMulti(prefixButtons);
    toggleMulti(mainCats);
    toggleSingle(tCats);

    document.getElementById('baseName').addEventListener('input', render);
    document.getElementById('dateText').addEventListener('input', render);
    document.getElementById('tSuffix').addEventListener('input', render);
    document.getElementById('generateBtn').addEventListener('click', render);

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('baseName').value = 'John';
      document.getElementById('dateText').value = '031126';
      document.getElementById('tSuffix').value = 'BC';

      prefixButtons.forEach(btn => btn.classList.add('active'));
      mainCats.forEach(btn => btn.classList.add('active'));
      tCats.forEach(btn => btn.classList.remove('active'));
      document.querySelector('.cat-t[data-cat="Cloths"]').classList.add('active');
      render();
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      const lines = buildNames();
      try {
        await navigator.clipboard.writeText(lines.join('\n'));
        alert('คัดลอกเรียบร้อย');
      } catch (e) {
        alert('คัดลอกไม่สำเร็จ');
      }
    });

    function getActiveValues(selector) {
      return [...document.querySelectorAll(selector)]
        .filter(el => el.classList.contains('active'))
        .map(el => el.dataset.cat || el.dataset.prefix);
    }

    function buildNames() {
      const name = document.getElementById('baseName').value.trim() || 'John';
      const date = document.getElementById('dateText').value.trim() || '031126';
      const tSuffix = document.getElementById('tSuffix').value.trim() || 'BC';
      const prefixes = getActiveValues('.prefix-btn');
      const cats = getActiveValues('.cat-main');
      const tCat = document.querySelector('.cat-t.active')?.dataset.cat || 'Cloths';

      const output = [];

      prefixes.forEach(prefix => {
        if (prefix === 'T') {
          output.push(`${prefix}_${name}_${date}_${tCat}_${tSuffix}`);
        } else {
          cats.forEach(cat => {
            output.push(`${prefix}_${name}_${date}_${cat}`);
          });
        }
      });

      return output;
    }

    function render() {
      const names = buildNames();
      preview.innerHTML = '';

      if (!names.length) {
        preview.innerHTML = '<div class="muted">กรุณาเลือกอย่างน้อย 1 Prefix</div>';
        return;
      }

      names.forEach(full => {
        const parts = full.split('_');
        const card = document.createElement('div');
        card.className = 'file-card';

        const top = document.createElement('div');
        top.className = 'top';
        top.textContent = `${parts[0]}_${parts[1]}`;

        const bottom = document.createElement('div');
        bottom.className = 'bottom';
        bottom.textContent = '_' + parts.slice(2).join('_');

        card.appendChild(top);
        card.appendChild(bottom);
        preview.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
